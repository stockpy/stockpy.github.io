<div class="directory-archive">
  {% for category in site.categories %}
    <details style="margin-bottom: 15px; cursor: pointer;">
      <summary style="font-size: 1.17em; font-weight: bold; outline: none;">
        📁 {{ category[0] }} ({{ category[1].size }})
      </summary>
      
      <ul style="list-style-type: none; padding-left: 20px; margin-top: 8px;">
        {% for post in category[1] %}
          <li style="margin-bottom: 6px;">
            📄 <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
            <span style="color: #888; font-size: 0.85em;">({{ post.date | date: "%Y-%m-%d" }})</span>
          </li>
        {% endfor %}
      </ul>
    </details>
  {% endfor %}
</div>
